<!-- Breadcrumbs-->
<ol class="breadcrumb">
    <li class="active">
        <i class="fas fa-info"></i>
        <span class="dipDeviceInformationLabel"></span>
    </li>
</ol>

<div class="form-group w-100 d-none">
    <div class="col-sm-6 offset-sm-3">
        <input id="dipGetDeviceInformationButton" type="button" class="btn btn-dark btn-block systemButton" value=""></input>
    </div>
</div>

<div class="clearfix"></div>

<div class="form-group row">
    <div class="col-md-6">
        <fieldset class="border shadow-sm p-2 pb-0 mb-3 mb-md-0 infoFieldset bg-light fieldset-border">
            <legend class="w-auto dipFirmwareReleaseLabel"></legend>
            <div id="firmwareRelease" class="w-100"></div>
        </fieldset>
    </div>
    <div class="col-md-6">
        <fieldset class="border shadow-sm p-2 pb-0 mb-0 infoFieldset bg-light fieldset-border">
            <legend class="w-auto dipDeviceIdentifierLabel"></legend>
            <div id="deviceIdentifier" class="w-100"></div>
        </fieldset>
    </div>
</div>

<div class="form-group row">
    <div class="col-md-6">
        <fieldset class="border shadow-sm p-2 pb-0 mb-3 mb-md-0 infoFieldset bg-light fieldset-border">
            <legend class="w-auto dipPumpProtocolsLabel"></legend>
            <table id="pumpProtocols" class="display w-100">
                <thead>
                    <tr>
                        <th class="text-center dipIndexLabel"></th>
                        <th class="dipCommunicationProtocolLabel"></th>
                    </tr>
                </thead>
            </table>
        </fieldset>
    </div>
    <div class="col-md-6">
        <fieldset class="border shadow-sm p-2 pb-0 mb-0 infoFieldset bg-light fieldset-border">
            <legend class="w-auto dipProbeProtocolsLabel"></legend>
            <table id="probeProtocols" class="display w-100">
                <thead>
                    <tr>
                        <th class="text-center dipIndexLabel"></th>
                        <th class="dipCommunicationProtocolLabel"></th>
                    </tr>
                </thead>
            </table>
        </fieldset>
    </div>
</div>

<div class="form-group row">
    <div class="col-md-6">
        <fieldset class="border shadow-sm p-2 pb-0 mb-3 mb-md-0 infoFieldset bg-light fieldset-border">
            <legend class="w-auto dipPriceBoardProtocolsLabel"></legend>
            <table id="priceBoardProtocols" class="display w-100">
                <thead>
                    <tr>
                        <th class="text-center dipIndexLabel"></th>
                        <th class="dipCommunicationProtocolLabel"></th>
                    </tr>
                </thead>
            </table>
        </fieldset>
    </div>
    <div class="col-md-6">
        <fieldset class="border shadow-sm p-2 pb-0 mb-0 infoFieldset bg-light fieldset-border">
            <legend class="w-auto dipReaderProtocolsLabel"></legend>
            <table id="readerProtocols" class="display w-100">
                <thead>
                    <tr>
                        <th class="text-center dipIndexLabel"></th>
                        <th class="dipCommunicationProtocolLabel"></th>
                    </tr>
                </thead>
            </table>
        </fieldset>
    </div>
</div>

<div class="form-group row">
    <div class="col-md-6">
        <fieldset class="border shadow-sm p-2 pb-0 mb-3 mb-md-0 infoFieldset bg-light fieldset-border">
            <legend class="w-auto dipBatteryStatusLabel"></legend>
            <div id="batteryStatus" class="w-100"></div>
        </fieldset>
    </div>
    <div class="col-md-6">
        <fieldset class="border shadow-sm p-2 pb-0 mb-0 infoFieldset bg-light fieldset-border">
            <legend class="w-auto dipCpuTemperatureLabel"></legend>
            <div id="cpuTemperature" class="w-100"></div>
            <div class="w-100 d-none d-md-block">&nbsp;</div>
        </fieldset>
    </div>
</div>

<div class="form-group row">
    <div class="col-md-6">
        <fieldset class="border shadow-sm p-2 pb-0 mb-3 mb-md-0 infoFieldset bg-light fieldset-border">
            <legend class="w-auto dipSDFlashDiskLabel"></legend>
            <div id="sdInformation"></div>
        </fieldset>
    </div>
    <div class="col-md-6">
        <fieldset class="border shadow-sm p-2 mb-3 pb-0 mb-0 infoFieldset bg-light fieldset-border">
            <legend class="w-auto dipGpsReceiverDataLabel"></legend>
            <div id="dipGpsReceiverData" class="w-100"></div>
        </fieldset>
        <fieldset class="border shadow-sm p-2 pb-0 mb-0 infoFieldset bg-light fieldset-border">
            <legend class="w-auto dipSystemOperationLabel"></legend>
            <div id="dipSystemInfo" class="w-100"></div>

            <div class="collapse pt-1" id="collapseSystemTasks">
                <div class="card card-body p-0">
                    <table id="dipSystemTasks" class="w-100 table table-bordered table-sm mb-0"></table>
                </div>
            </div>
        </fieldset>
    </div>
</div>

<script src="js/DeviceInformationPage.js" type="text/javascript"></script>
