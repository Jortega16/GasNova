<div class="form-group w-100">
    <div class="col-sm-6 offset-sm-3">
        <input id="rpGenerateReportGpsButton" type="button" class="btn btn-dark btn-block systemButton" value=""></input>
    </div>
</div>

<div id="trpGpsTable" class="form-group w-100 pt-3 d-none">
    <div class="form-group row">
        <div class="col">
            <fieldset class="border shadow-sm p-2 infoFieldset bg-light fieldset-border">
                <legend class="w-auto" id="trpGpsRecordsReportHeader"></legend>
                <table id="trpGps" class="display w-100">
                    <thead>
                        <tr>
                            <th class="text-center">#</th>
                            <th class="text-center trpDateTimeLabel"></th>
                            <th class="text-center trpLatitudeLabel"></th>
                            <th class="text-center trpNorthSouthIndicatorLabel"></th>
                            <th class="text-center trpLongitudeLabel"></th>
                            <th class="text-center trpEastWestIndicatorLabel"></th>
                            <th class="text-center trpSpeedOverGroundLabel"></th>
                            <th class="text-center trpCourseOverGroundLabel"></th>
                            <th class="text-center trpModeLabel"></th>
                        </tr>
                    </thead>
                </table>
            </fieldset>
        </div>
    </div>
</div>


<script src="js/GpsReportingPage.js" type="text/javascript"></script>
