<div class="form-group w-100">
    <div class="col-sm-6 offset-sm-3">
        <input id="rpGenerateReportPumpsButton" type="button" class="btn btn-dark btn-block systemButton" value=""></input>
    </div>
</div>

<div id="prpPumpsTable" class="form-group w-100 pt-3 d-none">
    <div class="form-group row">
        <div class="col">
            <fieldset class="border shadow-sm p-2 infoFieldset bg-light fieldset-border">
                <legend class="w-auto" id="trpPumpsTransactionsReportHeader"></legend>
                <table id="prpPumps" class="display w-100">
                    <thead>
                        <tr>
                            <th class="text-center">#</th>
                            <th class="text-center rpDateTimeStartLabel"></th>
                            <th class="text-center rpDateTimeEndLabel"></th>
                            <th class="text-center rpPumpLabel"></th>
                            <th class="text-center rpNozzleLabel"></th>
                            <th class="text-center rpTransactionLabel"></th>
                            <th class="text-center rpPriceLabel"></th>
                            <th class="text-center rpFilledVolumeLabel"></th>
                            <th class="text-center rpFilledAmountLabel"></th>
                            <th class="text-center rpVolumeTotalsLabel"></th>
                            <th class="text-center rpAmountTotalsLabel"></th>
                            <th class="text-center rpUserLabel"></th>
                            <th class="text-center rpTagLabel"></th>
                        </tr>
                    </thead>
                    <tfoot>
                        <tr>
                            <th colspan="7" class="text-right font-weight-bold font-italic border-bottom rpTotalLabel"></th>
                            <th class="text-center font-weight-bold font-italic border-bottom"></th>
                            <th class="text-center font-weight-bold font-italic border-bottom"></th>
                            <th colspan="4" class="text-center font-weight-bold"></th>
                        </tr>
                    </tfoot>
                </table>
            </fieldset>
        </div>
    </div>
</div>

<div id="prpPumpNozzlesTotalsTable" class="form-group w-100 pt-3 d-none">
    <div class="form-group row">
        <div class="col">
            <fieldset class="border shadow-sm p-2 infoFieldset bg-light fieldset-border">
                <legend class="w-auto" id="trpPumpNozzlesTotalsReportHeader"></legend>
                <table id="prpPumpNozzlesTotals" class="display w-100">
                    <thead>
                        <tr>
                            <th class="text-center">#</th>
                            <th class="text-center rpPumpLabel"></th>
                            <th class="text-center rpNozzleLabel"></th>
                            <th class="text-center font-weight-bold rpSummaryFilledVolumeLabel"></th>
                            <th class="text-center font-weight-bold rpSummaryFilledAmountLabel"></th>
                            <th class="text-center rpVolumeTotalsOnStartLabel"></th>
                            <th class="text-center rpVolumeTotalsOnEndLabel"></th>
                            <th class="text-center font-weight-bold rpVolumeTotalsDifferenceLabel"></th>
                            <th class="text-center rpAmountTotalsOnStartLabel"></th>
                            <th class="text-center rpAmountTotalsOnEndLabel"></th>
                            <th class="text-center font-weight-bold rpAmountTotalsDifferenceLabel"></th>
                            <th class="text-center font-weight-bold rpAverageFillingSpeedLabel"></th>
                        </tr>
                    </thead>
                    <tfoot>
                        <tr>
                            <th colspan="3" class="text-right font-weight-bold font-italic border-bottom rpTotalLabel"></th>
                            <th class="text-center font-weight-bold font-italic border-bottom"></th>
                            <th class="text-center font-weight-bold font-italic border-bottom"></th>
                            <th colspan="7" class="text-center font-weight-bold"></th>
                        </tr>
                    </tfoot>
                </table>
            </fieldset>
        </div>
    </div>
</div>

<script src="js/PumpsReportingPage.js" type="text/javascript"></script>
