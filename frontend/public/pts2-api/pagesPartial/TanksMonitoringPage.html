<!-- Breadcrumbs-->
<ol class="breadcrumb">
    <li class="active">
        <i class="fas fa-tint"></i>
        <span class="tmpTanksMonitoringLabel"></span>
    </li>
</ol>

<!-- Area for displaying tanks -->
<div id="tmpTanks" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 d-none w-100"></div>

<!-- No tanks are configured -->
<div id="tmpNoTanks" class="text-center row w-100 d-none">
    <h1 class="m-5 w-100">
        <i class="fas fa-database"></i>
        <span class="tmpNoTanksConfiguredLabel"></span>
    </h1>
</div>

<div class="col mb-4 tmpTankControlTemplate d-none">
    <div class="card shadow-sm bg-light border-secondary h-100" style="min-width: 17rem;">
        <h5 class="card-title text-left font-weight-bold m-2">
            <span class="tmpTankNumber border rounded-circle bg-dark text-white mr-1 ml-0 pl-2 pr-2"></span>

            <span class="tmpFuelGradeName border rounded-pill bg-primary text-white d-none p-1 pl-3 pr-3"></span>
            
            <div class="tmpDeliveryButton btn-group m-0 p-0 pr-1 pl-1 float-right d-none">
                <a class="text-info" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                    <i class="fas fa-truck"></i>
                </a>
                <div class="tmpDeliveryInfo dropdown-menu p-0" style="min-width:300px;"></div>
            </div>

            <div class="tmpWarningButton btn-group m-0 p-0 pr-1 pl-1 float-right d-none">
                <a class="text-danger fa-blink" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                    <i class="fas fa-exclamation-triangle"></i>
                </a>
                <div class="tmpWarningInfo dropdown-menu p-0" style="min-width:300px;"></div>
            </div>
        </h5>
        <div class="card-body m-0 p-0 pl-1 pr-1">
            <div class="jumbotron mb-1 p-0 border border-secondary rounded-pill text-center">
                <span class="display-4 font-weight-bold"><span class="tmpTankFillingPercentage"></span></span>
            </div>
            <table class="table table-striped table-sm mb-1">
                <tbody>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="js/TanksMonitoringPage.js" type="text/javascript"></script>
