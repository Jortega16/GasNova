<!-- Area for displaying tanks -->
<div id="pcpPumps" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 m-1 d-none w-100"></div>

<div class="col mb-4 pcpPumpControlTemplate d-none">
    <div class="card shadow-sm bg-light border-secondary h-100">
        <h5 class="card-title border-bottom border-secondary text-center font-weight-bold bg-success text-white m-0">
            <span class="pcpPumpNumber float-left border rounded-circle bg-dark text-white mr-1 ml-0 pl-2 pr-2"></span>
            <span class="pcpPumpStatus"></span>
            <span class="pcpPumpUser float-right font-italic text-white m-0 p-0 mr-1" style="font-size:10px; text-shadow: -1px 0 black, 0 1px black, 1px 0 black, 0 -1px black;"></span>
        </h5>
        <div class="card-body m-0 p-1">

            <table class="w-100">
                <tr>
                    <td class="font-weight-bold text-right pr-1 w-25">
                        <span class="pcpAmountLabel" style="font-size:14px;"></span>
                    </td>
                    <td>
                        <input readonly type="text" class="pcpPumpAmount form-control font-weight-bold text-monospace text-dark bg-white w-100 text-right h-100 p-0 pr-1" value="12345.67" style="font-size:14px;">
                    </td>
                </tr>
                <tr>
                    <td class="font-weight-bold text-right pr-1 w-25">
                        <span class="pcpVolumeLabel" style="font-size:14px;"></span>
                    </td>
                    <td>
                        <input readonly type="text" class="pcpPumpVolume form-control font-weight-bold text-monospace text-dark bg-white w-100 text-right h-100 p-0 pr-1" value="12345.67" style="font-size:14px;">
                    </td>
                </tr>
                <tr>
                    <td class="font-weight-bold text-right pr-1 w-25">
                        <span class="pcpPriceLabel" style="font-size:14px;"></span>
                    </td>
                    <td>
                        <input readonly type="text" class="pcpPumpPrice form-control font-weight-bold text-monospace text-dark bg-white w-100 text-right h-100 p-0 pr-1" value="123.45" style="font-size:14px;">
                    </td>
                </tr>
            </table> 

            <div class="progress w-100 mt-1 mb-1" style="height: 2px;">
                <div class="pcpPumpProgress progress-bar bg-info" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
            </div>

            <table class="w-100">
                <tr>
                    <td class="font-weight-bold text-right pr-1 w-50">
                        <span class="font-italic pcpNozzleShortLabel"></span>:
                    </td>
                    <td>
                        <select class="pcpPumpNozzleGrade text-center border border-dark font-weight-bold border-rounded w-100 m-0" style="font-size:12px"></select>
                    </td>
                </tr>
            </table>

            <div>
                <table class="w-100">
                    <tr>
                        <td class="w-50">
                            <button type="button" disabled="disabled" class="pcpPumpStartButton btn btn-success btn-block font-weight-bold" data-toggle="modal" data-target="#pcpAuthorizeModal"></button>
                        </td>
                        <td class="w-50">
                            <button type="button" disabled="disabled" class="pcpPumpStopButton btn btn-danger btn-block font-weight-bold" onclick="stopPump(this)">Stop</button>
                        </td>
                    </tr>
                </table>
            </div>                      
        </div>
    </div>
</div>

<!-- Authorize Modal-->
<div class="modal fade" id="pcpAuthorizeModal" tabindex="-1" aria-labelledby="pcpAuthorizeModalLabel" aria-hidden="true">
    <div class="modal-dialog  modal-dialog-centered modal-dialog-scrollable" role="document">
        <div class="modal-content">
            <div class="modal-header bg-warning">
                <h5 class="modal-title" id="pcpAuthorizeModalLabel"></h5>
                <button class="close" type="button" data-dismiss="modal" aria-label="Close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="pcpAuthorizeModalText" class="modal-body">
                <div class="row justify-content-md-center">
                    <div class="col-12 col-sm-7">
                        <div class="row mb-4">
                            <div class="col-3 text-right font-italic pcpPumpLabel"></div>
                            <div class="col-9 text-center border-bottom font-weight-bold">
                                <span class="pcpAuthDlgPumpNumber"></span>
                            </div>
                        </div>
                        <div class="row mb-4">
                            <div class="col-3 mt-2 text-right font-italic pcpNozzleShortLabel"></div>
                            <div class="col-9 text-center p-xs-2 p-sm-0">
                                <select id="pcpAuthDlgPumpNozzleGrade" class="form-control font-weight-bold">
                                </select>
                            </div>
                        </div>
                        <div class="row mb-4">
                            <div class="col-3 mt-2 text-right font-italic pcpTypeLabel"></div>
                            <div class="col-9 text-center p-xs-2 p-sm-0">
                                <select id="pcpAuthDlgPumpMode" class="form-control font-weight-bold">
                                </select>
                            </div>
                        </div>
                        <div class="row mb-4">
                            <div class="col-3 mt-2 text-right font-italic">
                                <label class="pcpAuthDlgPumpPresetValueLabel text-dark" for="pcpAuthDlgPumpPresetValue">Value</label>
                            </div>
                            <div class="col-9 text-center p-xs-2 p-sm-0">
                                <input readonly="true" class="form-control font-weight-bold bg-white text-dark text-center" id="pcpAuthDlgPumpPresetValue">
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-sm-5 btn-group-vertical text-center w-100" role="group">
                        <div class="btn-group">
                            <button type="button" class="pcpAuthDlgPresetButton btn btn-secondary border border-white w-25 font-weight-bold py-1 pcpAuthDlgBtn1" style="font-size:26px;">1</button>
                            <button type="button" class="pcpAuthDlgPresetButton btn btn-secondary border border-white w-25 font-weight-bold py-1 pcpAuthDlgBtn2" style="font-size:26px;">2</button>
                            <button type="button" class="pcpAuthDlgPresetButton btn btn-secondary border border-white w-25 font-weight-bold py-1 pcpAuthDlgBtn3" style="font-size:26px;">3</button>
                        </div>
                        <div class="btn-group">
                            <button type="button" class="pcpAuthDlgPresetButton btn btn-secondary border border-white w-25 font-weight-bold py-1 pcpAuthDlgBtn4" style="font-size:26px;">4</button>
                            <button type="button" class="pcpAuthDlgPresetButton btn btn-secondary border border-white w-25 font-weight-bold py-1 pcpAuthDlgBtn5" style="font-size:26px;">5</button>
                            <button type="button" class="pcpAuthDlgPresetButton btn btn-secondary border border-white w-25 font-weight-bold py-1 pcpAuthDlgBtn6" style="font-size:26px;">6</button>
                        </div>
                        <div class="btn-group">
                            <button type="button" class="pcpAuthDlgPresetButton btn btn-secondary border border-white w-25 font-weight-bold py-1 pcpAuthDlgBtn7" style="font-size:26px;">7</button>
                            <button type="button" class="pcpAuthDlgPresetButton btn btn-secondary border border-white w-25 font-weight-bold py-1 pcpAuthDlgBtn8" style="font-size:26px;">8</button>
                            <button type="button" class="pcpAuthDlgPresetButton btn btn-secondary border border-white w-25 font-weight-bold py-1 pcpAuthDlgBtn9" style="font-size:26px;">9</button>
                        </div>
                        <div class="btn-group">
                            <button type="button" class="pcpAuthDlgPresetButton btn btn-secondary border border-white w-25 font-weight-bold py-1 pcpAuthDlgBtnDecimal" style="font-size:26px;">.</button>
                            <button type="button" class="pcpAuthDlgPresetButton btn btn-secondary border border-white w-25 font-weight-bold py-1 pcpAuthDlgBtn0" style="font-size:26px;">0</button>
                            <button type="button" class="pcpAuthDlgPresetButton btn btn-secondary border border-white w-25 font-weight-bold py-1 pcpAuthDlgBtnClean" style="font-size:26px;"><i class="fas fa-backspace"></i></button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <table class="w-100">
                    <tr>
                        <td class="w-50">
                            <button class="btn btn-success btn-block font-weight-bold" type="button" id="pcpAuthDlgStartButton"></a>
                        </td>
                        <td class="w-50">
                            <button class="btn btn-danger btn-block font-weight-bold pcpCancelButton" type="button" data-dismiss="modal"></button>
                        </td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="js/PumpsControlWidgetsPage.js" type="text/javascript"></script>
