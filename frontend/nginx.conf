# Redirige HTTP -> HTTPS, excepto la descarga de la CA local (así se puede
# instalar en cualquier dispositivo sin advertencia de certificado antes de
# siquiera confiar en gasnova.local).
server {
    listen 80;
    server_name _;

    location = /gasnova-ca.crt {
        alias /etc/nginx/certs/ca.crt;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition "attachment; filename=gasnova-ca.crt";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/certs/gasnova.crt;
    ssl_certificate_key /etc/nginx/certs/gasnova.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location = /gasnova-ca.crt {
        alias /etc/nginx/certs/ca.crt;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition "attachment; filename=gasnova-ca.crt";
    }

    # SPA routing — todas las rutas sirven index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy al backend FastAPI
    location /api/ {
        proxy_pass http://gasnova-backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # WebSocket al backend
    location /ws/ {
        proxy_pass http://gasnova-backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # WebSocket PTS-2 event server
    location /ptsWebSocket {
        proxy_pass http://gasnova-backend:8000/ptsWebSocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
