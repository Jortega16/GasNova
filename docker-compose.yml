services:

  # ── Base de datos ────────────────────────────────────────────────────────────
  gasnova-db:
    image: postgres:16-alpine
    container_name: gasnova-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gasnova
      POSTGRES_PASSWORD: gasnova_secret
      POSTGRES_DB: gasnovalocal
    volumes:
      - gasnova_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gasnova -d gasnovalocal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend FastAPI ──────────────────────────────────────────────────────────
  gasnova-backend:
    image: ${BACKEND_IMAGE:-ghcr.io/jortega16/gasnova-backend:latest}
    container_name: gasnova-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://gasnova:gasnova_secret@gasnova-db:5432/gasnovalocal
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/reports:/app/reports
      # CUPS socket para impresora térmica (Linux)
      # - /var/run/cups/cups.sock:/var/run/cups/cups.sock
    ports:
      - "8002:8000"
    depends_on:
      gasnova-db:
        condition: service_healthy

  # ── Frontend (nginx HTTP en la imagen — sin mounts ni build en prod) ─────────
  gasnova-frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/jortega16/gasnova-frontend:latest}
    container_name: gasnova-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - gasnova-backend

  # ── pgAdmin: administración web de la base de datos ─────────────────────────
  # Acceso en http://localhost:5050 — al conectar un servidor nuevo dentro de
  # pgAdmin, usar host "gasnova-db", puerto 5432, usuario/clave de arriba.
  gasnova-pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gasnova-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@gasnova.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-gasnova_admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - gasnova_pgadmin:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - gasnova-db

  # ── mDNS (opcional, solo Linux): docker compose --profile mdns up -d ────────
  gasnova-mdns:
    profiles: ["mdns"]
    image: flungo/avahi
    container_name: gasnova-mdns
    restart: unless-stopped
    network_mode: host
    environment:
      HOST: gasnova
    privileged: true

volumes:
  gasnova_data:
    name: gasnova_data
  gasnova_pgadmin:
    name: gasnova_pgadmin
