services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gasnova
      POSTGRES_PASSWORD: gasnova_secret
      POSTGRES_DB: gasnovalocal
    ports:
      - "5443:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gasnova"]
      interval: 10s
      timeout: 5s
      retries: 5

  pts2-sdk:
    build: .
    env_file:
      - .env
    ports:
      - "8002:8000"
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
